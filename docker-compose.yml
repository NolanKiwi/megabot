version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: megabot-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: megabot
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: megabot-server
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - server/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/megabot

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: megabot-web
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  mongo_data:
